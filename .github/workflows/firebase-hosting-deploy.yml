name: Deploy to Firebase (Hosting + Functions)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      # Deploy Cloud Functions
      - name: Install Functions dependencies
        run: cd functions && npm ci

      - name: Create Functions .env
        run: |
          {
            printf 'THAILAND_POST_API_KEY=%s\n' "$THAI_POST_KEY"
            printf 'GOOGLE_MAPS_API_KEY=%s\n' "$GOOGLE_MAPS_KEY"
          } > functions/.env
        env:
          THAI_POST_KEY: ${{ secrets.THAILAND_POST_API_KEY }}
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

      - name: Deploy Firebase Functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --project bkk-apple-tradein
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}

      # Deploy Database Rules
      - name: Deploy Firebase Database Rules
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only database --project bkk-apple-tradein
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}

      # Deploy Storage Rules (disabled — service account missing
      # firebasestorage.defaultBucket.get permission). Once the SA gets
      # the "Firebase Storage Admin" or "Storage Admin" role in IAM,
      # re-enable this step. Until then, run manually:
      #   firebase deploy --only storage --project bkk-apple-tradein
      # - name: Deploy Firebase Storage Rules
      #   uses: w9jds/firebase-action@master
      #   with:
      #     args: deploy --only storage --project bkk-apple-tradein
      #   env:
      #     GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}

      # Deploy Hosting
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}
          channelId: live
          projectId: bkk-apple-tradein
          target: admin
