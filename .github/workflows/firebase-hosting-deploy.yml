name: Deploy to Firebase (Hosting + Functions)

on:
  push:
    branches: [main]

# Hosting and Functions are deployed by two INDEPENDENT jobs that run in
# parallel. Previously they were sequential steps in one job with Functions
# before Hosting and no `continue-on-error`, so any Functions failure (e.g. a
# Firebase auth/credential error) aborted the job before Hosting ever ran and
# the admin web app silently stopped shipping. Splitting them means a Functions
# failure no longer blocks the Hosting deploy (and each reports its own status).
jobs:
  deploy-hosting:
    name: Deploy Hosting (admin web app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node 20, NOT the runner default (22.23+). firebase-tools (run by
      # action-hosting-deploy below) hits an undici "Premature close" on the
      # Google OAuth token fetch on Node 22.23+, which surfaces as "Failed to
      # authenticate" and blocks the deploy. Node 20's undici works. Do not bump
      # without re-testing the deploy.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      # NOTE: database + storage rules are deployed exclusively from
      # bkk-frontend-next now. Maintaining two copies caused the rules
      # to silently overwrite each other on every push (see PR #492 /
      # #496 for the incident postmortem). Rules files have been
      # deleted from this repo, and firebase.json no longer references
      # them. To change rules, edit bkk-frontend-next/database.rules.json
      # or bkk-frontend-next/storage.rules and deploy from there.

      - name: Deploy Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}
          channelId: live
          projectId: bkk-apple-tradein
          target: admin

      # ── BKK Chat (separate Hosting site, same build) ─────────────────────
      # Both steps are continue-on-error so a chat-site problem can NEVER
      # block the admin deploy above. First run needs the site to exist —
      # this step creates it idempotently (errors like "already exists" are
      # swallowed). If the service account lacks sites.create permission,
      # create the site once by hand: Firebase console > Hosting > Add site
      # > "bkk-apple-chat" (or change the id in .firebaserc + here).
      - name: Ensure chat hosting site exists
        continue-on-error: true
        run: |
          printf '%s' "$FIREBASE_SA" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          npx firebase-tools@13 hosting:sites:create bkk-apple-chat --project bkk-apple-tradein || echo "site exists or create not permitted — continuing"
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}

      - name: Deploy Hosting (chat console)
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}
          channelId: live
          projectId: bkk-apple-tradein
          target: chat

  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node 20 -- same reason as the Hosting job above (firebase-tools undici
      # "Premature close" on Node 22.23+).
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: cd functions && npm ci

      - name: Create Functions .env
        run: |
          {
            printf 'THAILAND_POST_API_KEY=%s\n' "$THAI_POST_KEY"
            printf 'GOOGLE_MAPS_API_KEY=%s\n' "$GOOGLE_MAPS_KEY"
            printf 'SICKW_API_KEY=%s\n' "$SICKW_KEY"
            printf 'RESEND_API_KEY=%s\n' "$RESEND_KEY"
            printf 'EMAIL_FROM=%s\n' "$EMAIL_FROM"
            printf 'ORDER_NOTIFY_EMAIL=%s\n' "$ORDER_NOTIFY_EMAIL"
            printf 'EMAIL_REPLY_TO=%s\n' "$EMAIL_REPLY_TO"
            printf 'CUSTOMER_TRACKING_BASE_URL=%s\n' "$CUSTOMER_TRACKING_BASE_URL"
            printf 'TELEGRAM_BOT_TOKEN=%s\n' "$TELEGRAM_BOT_TOKEN"
            printf 'TELEGRAM_CHAT_ID=%s\n' "$TELEGRAM_CHAT_ID"
            printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY"
            printf 'CHAT_AI_MODEL=%s\n' "$CHAT_AI_MODEL"
          } > functions/.env
        env:
          THAI_POST_KEY: ${{ secrets.THAILAND_POST_API_KEY }}
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SICKW_KEY: ${{ secrets.SICKW_API_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          ORDER_NOTIFY_EMAIL: ${{ secrets.ORDER_NOTIFY_EMAIL }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          CUSTOMER_TRACKING_BASE_URL: ${{ secrets.CUSTOMER_TRACKING_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHAT_AI_MODEL: ${{ secrets.CHAT_AI_MODEL }}

      # Deploy via firebase-tools directly (pinned), authenticating with the
      # SAME service-account secret the Hosting job uses successfully, exposed
      # as Application Default Credentials. This replaces the third-party
      # `w9jds/firebase-action@master` action, whose moving `@master` tag broke
      # auth ("Failed to authenticate") while the pinned Hosting action kept
      # working. firebase.json pins `"codebase": "bkk-system"`, so
      # `deploy --only functions` is scoped to THIS codebase — it will not
      # touch the rider-notifications codebase's functions even with --force,
      # and it cleans up our own orphans (e.g. the renamed onJobStatusChanged)
      # as part of the normal deploy, so no separate delete step is needed.
      - name: Deploy Firebase Functions
        run: |
          printf '%s' "$FIREBASE_SA" > "$RUNNER_TEMP/gcp_sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/gcp_sa.json"
          npx --yes firebase-tools@15.22.0 deploy \
            --only functions \
            --project bkk-apple-tradein \
            --force \
            --non-interactive
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}

