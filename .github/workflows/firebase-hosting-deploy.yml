name: Deploy to Firebase (Hosting + Functions)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      # Deploy Cloud Functions
      - name: Install Functions dependencies
        run: cd functions && npm ci

      - name: Create Functions .env
        run: |
          {
            printf 'THAILAND_POST_API_KEY=%s\n' "$THAI_POST_KEY"
            printf 'GOOGLE_MAPS_API_KEY=%s\n' "$GOOGLE_MAPS_KEY"
            printf 'SICKW_API_KEY=%s\n' "$SICKW_KEY"
          } > functions/.env
        env:
          THAI_POST_KEY: ${{ secrets.THAILAND_POST_API_KEY }}
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SICKW_KEY: ${{ secrets.SICKW_API_KEY }}

      # One-time pre-delete of the colliding function name `onJobStatusChanged`.
      # Renamed to `onAdminJobStatusNotify` in this codebase to stop
      # overwriting rider-notifications codebase's function of the same name
      # (Firebase identifies functions by {region}/{name} project-wide;
      # codebases don't namespace). Without an explicit delete, the next
      # `firebase deploy --only functions` would either prompt-and-abort (CI
      # has no TTY) or auto-skip the deletion, leaving the orphan bearing
      # admin code and continuing to block rider's deploy from re-creating
      # its function under the same name. continue-on-error keeps the
      # workflow green once the function is gone (firebase functions:delete
      # exits non-zero when the target doesn't exist).
      - name: Delete orphaned onJobStatusChanged (one-time, idempotent)
        uses: w9jds/firebase-action@master
        continue-on-error: true
        with:
          args: functions:delete onJobStatusChanged --region asia-southeast1 --force --project bkk-apple-tradein
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}

      - name: Deploy Firebase Functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --project bkk-apple-tradein --force
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}

      # NOTE: database + storage rules are deployed exclusively from
      # bkk-frontend-next now. Maintaining two copies caused the rules
      # to silently overwrite each other on every push (see PR #492 /
      # #496 for the incident postmortem). Rules files have been
      # deleted from this repo, and firebase.json no longer references
      # them. To change rules, edit bkk-frontend-next/database.rules.json
      # or bkk-frontend-next/storage.rules and deploy from there.

      # Deploy Hosting
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}
          channelId: live
          projectId: bkk-apple-tradein
          target: admin
