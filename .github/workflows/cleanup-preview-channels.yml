name: Cleanup Preview Channels

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List only — don't delete"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Cleanup non-live preview channels
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json

          firebase hosting:channel:list \
            --site bkk-apple-admin \
            --project bkk-apple-tradein \
            --json > channels.json

          channels=$(jq -r '.result.channels[]?.name | sub(".*/channels/"; "")' channels.json)

          if [[ -z "$channels" ]]; then
            echo "No channels found."
            exit 0
          fi

          deleted=0
          kept=0
          for channel in $channels; do
            if [[ "$channel" == "live" ]]; then
              echo "skip: $channel (live)"
              kept=$((kept + 1))
              continue
            fi

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "would delete: $channel"
            else
              echo "deleting: $channel"
              firebase hosting:channel:delete "$channel" \
                --site bkk-apple-admin \
                --project bkk-apple-tradein \
                --force
            fi
            deleted=$((deleted + 1))
          done

          echo ""
          echo "Summary: $deleted channels processed, $kept kept (live)."
