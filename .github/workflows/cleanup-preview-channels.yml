name: Cleanup Preview Channels

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List only — don't delete"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Setup Firebase auth
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}
        run: |
          if [[ -z "$FIREBASE_SERVICE_ACCOUNT" ]]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN secret is empty"
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$HOME/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-sa.json" >> "$GITHUB_ENV"
          echo "Service account file written ($(wc -c < "$HOME/firebase-sa.json") bytes)"

      - name: Verify auth
        run: |
          set -x
          firebase --version
          firebase projects:list --project bkk-apple-tradein

      - name: List preview channels
        run: |
          set -x
          set +e

          firebase hosting:channel:list \
            --site bkk-apple-admin \
            --project bkk-apple-tradein \
            --json > channels.json 2> channels.err
          exit_code=$?

          echo "---firebase exit code: $exit_code---"
          echo "---stdout (channels.json)---"
          cat channels.json || echo "(empty)"
          echo "---stderr (channels.err)---"
          cat channels.err || echo "(empty)"

          if [[ $exit_code -ne 0 ]]; then
            echo "::error::firebase hosting:channel:list failed with exit $exit_code"
            exit $exit_code
          fi

          echo "---parsed names---"
          jq -r '.result.channels[]?.name // .channels[]?.name // empty' channels.json

      - name: Delete non-live channels
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -uo pipefail

          channels=$(jq -r '.result.channels[]?.name // .channels[]?.name // empty | split("/") | last' channels.json)

          if [[ -z "$channels" ]]; then
            echo "No channels found."
            exit 0
          fi

          deleted=0
          kept=0
          failed=0
          for channel in $channels; do
            if [[ "$channel" == "live" ]]; then
              echo "skip: $channel (live)"
              kept=$((kept + 1))
              continue
            fi

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "would delete: $channel"
              deleted=$((deleted + 1))
              continue
            fi

            echo "deleting: $channel"
            if firebase hosting:channel:delete "$channel" \
                --site bkk-apple-admin \
                --project bkk-apple-tradein \
                --force; then
              deleted=$((deleted + 1))
            else
              echo "::warning::failed to delete $channel"
              failed=$((failed + 1))
            fi
          done

          echo ""
          echo "Summary: $deleted deleted, $kept kept (live), $failed failed."
