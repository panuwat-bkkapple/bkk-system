name: Preview Deploy (PR)

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '**.md'
      - 'docs/**'

permissions:
  checks: write
  pull-requests: write

jobs:
  preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Node 20, NOT the runner default (22.23+): firebase-tools
      # (action-hosting-deploy) hits an undici "Premature close" on the OAuth
      # token fetch on Node 22.23+ -> "Failed to authenticate". Node 20 works.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Prune old preview channels BEFORE creating a new one. Firebase Hosting
      # caps preview channels at ~50 per site; past that the deploy step below
      # fails with HTTP 429 RESOURCE_EXHAUSTED (this bit PR #328). The `expires:
      # 1d` further down shortens each channel's life, but a burst of PRs can
      # still pile up faster than they expire, and expired-but-not-yet-GC'd
      # channels keep counting toward the cap. Keeping only the newest N (by
      # expiry) hard-bounds the count so we never approach the quota.
      # Best-effort: cleanup must never fail the build (continue-on-error).
      - name: Prune stale preview channels
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npm install -g firebase-tools@13 >/dev/null 2>&1
          KEEP=20
          # `--json` wraps output as { status, result }. result is either an
          # array of channels or { channels: [...] } depending on CLI version,
          # so coalesce both. Sort by expireTime descending (newest kept),
          # delete everything past the newest KEEP. Channels with no expiry
          # (never auto-expire) sort last and get pruned first — intended.
          channels=$(firebase hosting:channel:list \
            --site bkk-apple-admin --project bkk-apple-tradein --json 2>/dev/null || echo '{}')
          echo "$channels" \
            | jq -r --argjson keep "$KEEP" '
                (.result.channels // .result // [])
                | map(select(.name != null))
                | sort_by(.expireTime) | reverse
                | .[$keep:]
                | .[].name' \
            | sed 's#.*/channels/##' \
            | while read -r ch; do
                [ -z "$ch" ] && continue
                [ "$ch" = "live" ] && continue
                echo "Deleting stale preview channel: $ch"
                firebase hosting:channel:delete "$ch" \
                  --site bkk-apple-admin --project bkk-apple-tradein --force >/dev/null 2>&1 || true
              done
          rm -f "$RUNNER_TEMP/sa.json"

      - name: Build project
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BKK_APPLE_TRADEIN }}
          projectId: bkk-apple-tradein
          target: admin
          # Shorten the preview-channel lifetime from the 7d default to 1d.
          # Firebase Hosting limits ~50 preview channels per site; with the
          # PR cadence in this repo we hit RESOURCE_EXHAUSTED (HTTP 429)
          # repeatedly. 1d still covers the typical review-then-merge
          # window — we squash-merge fast and don't keep PR previews
          # around. Anything still relevant after a day can re-trigger
          # by pushing a new commit.
          expires: 1d
